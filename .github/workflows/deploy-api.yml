name: Deploy Go API to Cloud Run

on:
  push:
    branches:
      - main
    paths:
      - 'bom-board-app/**'

jobs:
  deploy:
    runs-on: ubuntu-latest

    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          credentials_json: '${{ secrets.GCP_SA_KEY }}'

      - name: Setup gcloud
        uses: google-github-actions/setup-gcloud@v2

      - name: Configure Docker for Artifact Registry
        run: |
          gcloud auth configure-docker asia-south1-docker.pkg.dev --quiet

      - name: Build Docker Image
        run: |
          docker build \
            -t asia-south1-docker.pkg.dev/bom-board-433/bom-board-repo/bom-board-api:latest \
            ./bom-board-app

      - name: Push Docker Image
        run: |
          docker push asia-south1-docker.pkg.dev/bom-board-433/bom-board-repo/bom-board-api:latest

      - name: Deploy to Cloud Run (Private)
        run: |
          gcloud run deploy bom-board-api \
            --image asia-south1-docker.pkg.dev/bom-board-433/bom-board-repo/bom-board-api:latest \
            --region asia-south1 \
            --platform managed \
            --no-allow-unauthenticated \
            --project bom-board-433